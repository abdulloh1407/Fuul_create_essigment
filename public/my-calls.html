<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Suhbatlarim - Agent Jurnali</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 flex min-h-screen font-sans">

    <!-- SIDEBAR -->
    <div class="w-64 bg-slate-900 text-white flex flex-col justify-between min-h-screen border-r border-slate-800 p-6 shrink-0">
        <div>
            <h1 class="text-2xl font-black tracking-wider text-emerald-400 mb-8 text-center font-mono">NextGen Agent</h1>
            <nav class="space-y-2">
                <a href="/employee-dashboard.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>📊 Shaxsiy Analitika</span></a>
                <a href="/my-clients.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>👥 Mening Mijozlarim</span></a>
                <a href="/my-calls.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg bg-emerald-500/10 text-emerald-400 font-semibold border-l-4 border-emerald-500"><span>📞 Suhbatlar Jurnali</span></a>
                <a href="/my-settings.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>⚙️ Sozlamalar</span></a>
            </nav>
        </div>
        <button onclick="localStorage.removeItem('crm_user'); window.location.href='/index.html';" class="w-full py-2.5 bg-red-500/10 hover:bg-red-500 border border-red-500 text-red-500 hover:text-white rounded-lg transition">Chiqish</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-grow p-8 overflow-y-auto">
        <div class="mb-8 border-b border-slate-800 pb-4">
            <h1 class="text-3xl font-bold">📞 Muzokaralar va Qaydlar Jurnali</h1>
            <p class="text-sm text-slate-400 mt-1">Mijozlaringiz bilan amalga oshirgan barcha qo'ng'iroqlaringiz va kelishuv izohlari.</p>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800/50 text-slate-400 text-sm uppercase">
                        <th class="p-4">Qayd ID</th>
                        <th class="p-4">Mijoz Ismi</th>
                        <th class="p-4">Suhbat Tafsiloti / Izoh</th>
                        <th class="p-4">Sana va Vaqt</th>
                    </tr>
                </thead>
                <tbody id="callsTableBody">
                    <!-- Dinamik yuklanadi -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('crm_user'));
        if(!currentUser || currentUser.role !== 'employee') window.location.href = '/index.html';

        async function loadMyCalls() {
            try {
                const res = await fetch(`/api/call-history/${currentUser.id}`);
                const calls = await res.json();
                const tbody = document.getElementById('callsTableBody');
                tbody.innerHTML = '';

                if(calls.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-slate-500">Sizda hali muzokara suhbat qaydlari mavjud emas.</td></tr>`;
                    return;
                }

                calls.forEach(call => {
                    const formattedDate = new Date(call.created_at).toLocaleString('uz-UZ', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    tbody.innerHTML += `
                        <tr class="border-b border-slate-800/60 hover:bg-slate-800/20 transition">
                            <td class="p-4 text-slate-500 font-mono">#CALL-${call.id}</td>
                            <td class="p-4 font-semibold text-white">${call.client_name}</td>
                            <td class="p-4 text-slate-300 text-sm">${call.note}</td>
                            <td class="p-4 text-slate-400 text-sm">${formattedDate}</td>
                        </tr>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        window.onload = loadMyCalls;
    </script>
</body>
</html>
