<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retake CRM - Tizimga Kirish</title>
    <!-- Google Fonts Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-glow': 'pulseGlow 4s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '0.15', transform: 'scale(1)' },
                            '50%': { opacity: '0.3', transform: 'scale(1.2)' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0b0f19] flex items-center justify-center min-h-screen font-sans overflow-hidden relative">
    <!-- Ambient background glows -->
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-sky-500 rounded-full blur-[120px] opacity-15 animate-pulse-glow"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-indigo-600 rounded-full blur-[120px] opacity-15 animate-pulse-glow" style="animation-delay: 2s;"></div>

    <div class="w-full max-w-md bg-slate-900/40 backdrop-blur-xl border border-slate-800/80 p-10 rounded-3xl shadow-2xl relative overflow-hidden animate-fade-in">
        <!-- Inside glass glow border -->
        <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-sky-500/40 to-transparent"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-sky-500 to-indigo-600 mb-4 shadow-lg shadow-sky-500/20">
                <span class="text-2xl font-black text-white font-mono">NG</span>
            </div>
            <h2 class="text-3xl font-extrabold text-white tracking-tight">CRM NextGen</h2>
            <p class="text-slate-400 mt-2.5 text-sm">Tizimga kirish uchun hisob ma'lumotlaringizni kiriting</p>
        </div>
        
        <form id="loginForm" class="space-y-6 relative z-10">
            <div>
                <label class="block text-slate-300 text-xs font-bold uppercase tracking-wider mb-2">Foydalanuvchi nomi</label>
                <input type="text" id="username" class="w-full bg-slate-950/80 border border-slate-800 text-slate-100 placeholder-slate-600 rounded-xl px-4 py-3.5 focus:outline-none focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 transition-all duration-300 text-sm font-medium" placeholder="Masalan: admin" required>
            </div>
            
            <div>
                <label class="block text-slate-300 text-xs font-bold uppercase tracking-wider mb-2">Parol</label>
                <input type="password" id="password" class="w-full bg-slate-950/80 border border-slate-800 text-slate-100 placeholder-slate-600 rounded-xl px-4 py-3.5 focus:outline-none focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 transition-all duration-300 text-sm font-medium" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-sky-500 to-indigo-600 hover:from-sky-600 hover:to-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-sky-500/20 transition-all duration-300 transform hover:-translate-y-0.5 active:scale-95 text-sm uppercase tracking-wider flex items-center justify-center space-x-2">
                <span>Tizimga Kirish</span>
                <span>→</span>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('crm_user', JSON.stringify(data.user));
                    
                    if (data.user.role === 'admin') {
                        window.location.href = 'dashboard.html';
                    } else if (data.user.role === 'employee') {
                        window.location.href = 'employee-dashboard.html';
                    } else {
                        alert('Sizga tegishli rol topilmadi!');
                    }
                } else {
                    alert(data.message || 'Login yoki parol noto\'g\'ri!');
                }
            } catch (error) {
                console.error('Xatolik tafsiloti:', error);
                alert('Server bilan ulanishda xatolik yuz berdi!');
            }
        });
    </script>
</body>
</html>
