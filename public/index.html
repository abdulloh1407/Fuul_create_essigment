<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM NextGen - izimga Kirish</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen font-sans">
    <div class="w-full max-w-md bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -left-10 w-40 h-40 bg-sky-600 rounded-full blur-3xl opacity-20"></div>
        <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-purple-600 rounded-full blur-3xl opacity-20"></div>

        <div class="text-center mb-8 relative z-10">
            <h2 class="text-3xl font-extrabold text-white tracking-tight">CRM NextGen</h2>
            <p class="text-slate-400 mt-2">Tizimga kirish uchun login va parolingizni kiriting</p>
        </div>
        
        <form id="loginForm" class="space-y-5 relative z-10">
            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-2">Foydalanuvchi nomi (Username)</label>
                <input type="text" id="username" class="w-full bg-slate-950 border border-slate-800 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 transition" placeholder="Masalan: admin" required>
            </div>
            
            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-2">Parol</label>
                <input type="password" id="password" class="w-full bg-slate-950 border border-slate-800 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 transition" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="w-full bg-sky-500 hover:bg-sky-600 text-slate-950 font-bold py-3 rounded-xl shadow-lg shadow-sky-500/20 transition duration-300 transform active:scale-95">
                Tizimga Kirish →
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Ma'lumotni saqlash (Rollar bilan birga)
                    localStorage.setItem('crm_user', JSON.stringify(data.user));
                    
                    // Roli bo'yicha kerakli sahifaga yo'naltirish
                    if (data.user.role === 'admin') {
                        window.location.href = 'dashboard.html'; // Admin analitika sahifasi
                    } else if (data.user.role === 'employee') {
                        window.location.href = 'employee-dashboard.html'; // Xodim sahifasi
                    } else {
                        alert('Sizga tegishli rol topilmadi!');
                    }
                } else {
                    alert(data.message || 'Login yoki parol noto\'g\'ri!');
                }
            } catch (error) {
                console.error('Xatolik tafsiloti:', error);
                alert('Server bilan ulanishda xatolik yuz berdi!');
            }
        });
    </script>
</body>
</html>
