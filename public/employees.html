<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM - Xodimlar Boshqaruvi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 flex min-h-screen font-sans">

    <div class="w-64 bg-slate-900 text-white flex flex-col justify-between min-h-screen border-r border-slate-800 p-6 shrink-0">
        <div>
            <h1 class="text-2xl font-black tracking-wider text-sky-400 mb-8 text-center">CRM NextGen</h1>
            <nav class="space-y-2">
                <a href="/dashboard.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>📊 1. Analitika</span></a>
                <a href="/employees.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg bg-sky-500/10 text-sky-400 font-semibold border-l-4 border-sky-500"><span>👥 2. Xodimlar (HRM)</span></a>
                <a href="/companies.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>🏢 3. Kompaniyalar</span></a>
                <a href="/global-leads.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>🌐 4. Global Leadlar</span></a>
                <a href="/finance.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>💰 5. Moliya</span></a>
                <a href="/audit-logs.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>📜 6. Audit Logs</span></a>
                <a href="/settings.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>⚙️ 7. Sozlamalar</span></a>
            </nav>
        </div>
        <button onclick="localStorage.removeItem('crm_user'); window.location.href='/index.html';" class="w-full py-2.5 bg-red-500/10 hover:bg-red-500 border border-red-500 text-red-500 hover:text-white rounded-lg transition">Chiqish</button>
    </div>

    <div class="flex-grow p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h1 class="text-3xl font-bold">Xodimlar (HRM Tizimi)</h1>
            <button onclick="toggleModal(true)" class="bg-sky-500 hover:bg-sky-600 text-slate-950 font-bold px-5 py-2.5 rounded-lg transition">+ Yangi Xodim Qo'shish</button>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800/50 text-slate-400 text-sm uppercase">
                        <th class="p-4">F.I.SH</th>
                        <th class="p-4">Username</th>
                        <th class="p-4">Bo'lim</th>
                        <th class="p-4">Roli</th>
                        <th class="p-4">Holati</th>
                    </tr>
                </thead>
                <tbody id="employeeTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="employeeModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md p-6 rounded-xl shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-sky-400">Yangi Xodim Ma'lumotlari</h3>
            <form id="addEmployeeForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">To'liq Ismi (F.I.SH)</label>
                    <input type="text" id="empFullName" required class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 focus:border-sky-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Username</label>
                    <input type="text" id="empUsername" required class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 focus:border-sky-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Parol</label>
                    <input type="password" id="empPassword" required class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 focus:border-sky-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Bo'limi</label>
                    <input type="text" id="empDepartment" placeholder="Masalan: Sotuv bo'limi" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 focus:border-sky-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Tizimdagi Roli</label>
                    <select id="empRole" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 focus:border-sky-500 outline-none text-slate-100">
                        <option value="employee">Employee (Xodim)</option>
                        <option value="admin">Admin (Boshqaruvchi)</option>
                    </select>
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="button" onclick="toggleModal(false)" class="w-1/2 bg-slate-800 hover:bg-slate-700 py-2.5 rounded-lg transition">Bekor qilish</button>
                    <button type="submit" class="w-1/2 bg-sky-500 hover:bg-sky-600 text-slate-950 font-bold py-2.5 rounded-lg transition">Saqlash</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Xavfsizlik nazorati
        const user = JSON.parse(localStorage.getItem('crm_user'));
        if(!user || user.role !== 'admin') window.location.href = '/index.html';

        function toggleModal(show) {
            document.getElementById('employeeModal').classList.toggle('hidden', !show);
        }

        async function loadEmployees() {
            try {
                const res = await fetch('/api/employees');
                const employees = await res.json();
                const tbody = document.getElementById('employeeTableBody');
                tbody.innerHTML = '';

                employees.forEach(emp => {
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-800/60 hover:bg-slate-800/20 transition">
                            <td class="p-4 font-semibold text-white">${emp.full_name}</td>
                            <td class="p-4 text-slate-300">${emp.username}</td>
                            <td class="p-4 text-slate-400">${emp.department || '-'}</td>
                            <td class="p-4"><span class="px-2 py-0.5 bg-purple-500/10 text-purple-400 border border-purple-500/20 rounded text-xs font-bold uppercase">${emp.role}</span></td>
                            <td class="p-4"><span class="text-emerald-400 text-sm font-medium">● Faol</span></td>
                        </tr>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        document.getElementById('addEmployeeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                username: document.getElementById('empUsername').value,
                password: document.getElementById('empPassword').value,
                full_name: document.getElementById('empFullName').value,
                department: document.getElementById('empDepartment').value,
                role: document.getElementById('empRole').value
            };

            const res = await fetch('/api/employees', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.success) {
                toggleModal(false);
                document.getElementById('addEmployeeForm').reset();
                loadEmployees();
            } else { alert('Xatolik yuz berdi!'); }
        });

        window.onload = loadEmployees;
    </script>
</body>
</html>
