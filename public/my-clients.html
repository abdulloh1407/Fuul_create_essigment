<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Mijozlarim - Xodim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 flex min-h-screen font-sans">

    <div class="w-64 bg-slate-900 text-white flex flex-col justify-between min-h-screen border-r border-slate-800 p-6 shrink-0">
        <div>
            <h1 class="text-2xl font-black tracking-wider text-emerald-400 mb-8 text-center font-mono">NextGen Agent</h1>
            <nav class="space-y-2">
                <a href="/employee-dashboard.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>📊 Shaxsiy Analitika</span></a>
                <a href="/my-clients.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg bg-emerald-500/10 text-emerald-400 font-semibold border-l-4 border-emerald-500"><span>👥 Mening Mijozlarim</span></a>
                <a href="/my-calls.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>📞 Suhbatlar Jurnali</span></a>
                <a href="/my-settings.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 transition"><span>⚙️ Sozlamalar</span></a>
            </nav>
        </div>
        <button onclick="localStorage.removeItem('crm_user'); window.location.href='/index.html';" class="w-full py-2.5 bg-red-500/10 hover:bg-red-500 border border-red-500 text-red-500 hover:text-white rounded-lg transition">Chiqish</button>
    </div>

    <div class="flex-grow p-8 overflow-y-auto">
        <div class="mb-8 border-b border-slate-800 pb-4">
            <h1 class="text-3xl font-bold" id="welcomeMessage">Mening Mijozlarim</h1>
            <p class="text-sm text-slate-400 mt-1">Faqat sizga biriktirilgan va siz muzokara olib borayotgan faol leadlar ro'yxati.</p>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800/50 text-slate-400 text-sm uppercase">
                        <th class="p-4">Mijoz</th>
                        <th class="p-4">Telefon</th>
                        <th class="p-4">Byudjet</th>
                        <th class="p-4">Holat</th>
                        <th class="p-4">Harakat</th>
                    </tr>
                </thead>
                <tbody id="myClientsTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="callModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md p-6 rounded-xl shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-emerald-400">Muzokara / Qo'ng'iroq jurnali</h3>
            <form id="callHistoryForm" class="space-y-4">
                <input type="hidden" id="modalClientId">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Mijoz bilan nima deb kelishildi? (Izoh)</label>
                    <textarea id="callNote" required rows="4" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 focus:border-emerald-500 outline-none text-slate-200" placeholder="Masalan: Ertaga soat 14:00 da qayta qo'ng'iroq kutilmoqda..."></textarea>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Mijozning Yangi Holati (Status)</label>
                    <select id="callStatus" required class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 focus:border-emerald-500 outline-none text-slate-100">
                        <option value="Jarayonda">Jarayonda (Muzokara faol)</option>
                        <option value="Muvaffaqiyatli">Muvaffaqiyatli (Bitim yopildi - Ro'yxatdan o'chadi)</option>
                        <option value="Rad etildi">Rad etildi (Bitim yopildi - Ro'yxatdan o'chadi)</option>
                    </select>
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="button" onclick="toggleCallModal(false)" class="w-1/2 bg-slate-800 hover:bg-slate-700 py-2.5 rounded-lg transition">Yopish</button>
                    <button type="submit" class="w-1/2 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-2.5 rounded-lg transition">Saqlash</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('crm_user'));
        if(!currentUser || currentUser.role !== 'employee') window.location.href = '/index.html';

        document.getElementById('welcomeMessage').innerText = `Xush kelibsiz, ${currentUser.full_name}`;

        function toggleCallModal(show, clientId = null) {
            document.getElementById('modalClientId').value = clientId;
            document.getElementById('callModal').classList.toggle('hidden', !show);
        }

        async function loadMyClients() {
            try {
                const res = await fetch(`/api/my-clients/${currentUser.id}`);
                const clients = await res.json();
                const tbody = document.getElementById('myClientsTableBody');
                tbody.innerHTML = '';

                if(clients.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-slate-500">Sizga hozircha hech qanday mijoz biriktirilmagan.</td></tr>`;
                    return;
                }

                clients.forEach(client => {
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-800/60 hover:bg-slate-800/20 transition">
                            <td class="p-4 font-semibold text-white">${client.name}</td>
                            <td class="p-4 text-slate-300">${client.phone}</td>
                            <td class="p-4 text-amber-400 font-medium">$${parseFloat(client.budget).toLocaleString()}</td>
                            <td class="p-4"><span class="px-2 py-0.5 bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 rounded text-xs font-bold">${client.status}</span></td>
                            <td class="p-4">
                                <button onclick="toggleCallModal(true, ${client.id})" class="text-xs bg-emerald-500 hover:bg-emerald-600 text-slate-950 px-3 py-1.5 rounded font-bold transition">📞 Qayd qoldirish</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        document.getElementById('callHistoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                client_id: parseInt(document.getElementById('modalClientId').value),
                user_id: currentUser.id,
                note: document.getElementById('callNote').value,
                status: document.getElementById('callStatus').value
            };

            const res = await fetch('/api/call-history', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.success) {
                toggleCallModal(false);
                document.getElementById('callHistoryForm').reset();
                alert('Suhbat qaydi muvaffaqiyatli saqlandi!');
                loadMyClients(); // Jadvalni qayta yuklash (yopilgan bitimlar ro'yxatdan o'chib ketadi)
            }
        });

        window.onload = loadMyClients;
    </script>
</body>
</html>
