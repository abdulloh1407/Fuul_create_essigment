version: '3.8'

services:
  db:
    image: postgres:15
    container_name: crm_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql

  web:
    build: .
    container_name: crm_node_server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_USER=postgres
      - DB_HOST=db
      - DB_NAME=crm_db
      - DB_PASSWORD=adminpassword
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  pgdata: